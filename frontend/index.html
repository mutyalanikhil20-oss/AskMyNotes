<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskMyNotes</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-animation min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-8 md:py-10">

  <!-- Main Card -->
  <div
    class="glass w-full max-w-3xl rounded-3xl shadow-2xl shadow-purple-500/20 p-6 sm:p-8"
  >

    <!-- Header -->
    <div class="text-center mb-10">
      <h1
        class="text-4xl sm:text-5xl font-extrabold text-slate-900"
      >
        AskMyNotes
      </h1>

      <p class="text-slate-700 mt-4 text-base sm:text-lg font-medium">
        Upload your PDF notes and ask questions using AI ✨
      </p>
    </div>

    <div class="space-y-6 sm:space-y-8">

      <!-- Upload Section -->
      <div
        class="bg-white border border-slate-200 rounded-2xl p-5 sm:p-6 shadow-lg hover:shadow-slate-300/40 transition-all"
      >
        <label
          for="pdf-input"
          class="block text-sm sm:text-base font-semibold text-slate-800 mb-4"
        >
          Upload PDF Notes
        </label>

        <input
          type="file"
          id="pdf-input"
          accept=".pdf"
          multiple
          class="block w-full text-sm text-slate-700 opacity-70 hover:opacity-90
          file:mr-4
          file:py-3
          file:px-6
          file:rounded-full
          file:border-0
          file:text-sm
          file:font-semibold
          file:bg-sky-500
          file:text-white
          hover:file:scale-105
          transition-all
          duration-300
          cursor-pointer"
        />

        <div id="file-preview" class="hidden mt-4 rounded-2xl border border-slate-200 bg-slate-50 p-3">
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <span class="text-sm text-slate-600 font-medium">Selected files</span>
            <span id="file-count" class="text-sm text-slate-500"></span>
          </div>
          <ul id="file-list" class="mt-3 space-y-2"></ul>
        </div>

        <div id="upload-status" class="text-sm text-slate-500 mt-3 font-medium">
          No file uploaded yet.
        </div>
      </div>

      <!-- Question Section -->
      <div
        class="bg-white border border-slate-200 rounded-2xl p-5 sm:p-6 shadow-lg hover:shadow-slate-300/40 transition-all"
      >
        <label
          for="question"
          class="block text-sm sm:text-base font-semibold text-slate-800 mb-4"
        >
          Ask Your Question
        </label>

        <textarea
          id="question"
          rows="4"
          placeholder="What do my notes say about AI?"
          class="w-full rounded-2xl border border-slate-300
          bg-slate-50
          text-slate-900
          text-sm sm:text-base
          placeholder-slate-400
          p-4
          focus:ring-4
          focus:ring-sky-200
          focus:border-sky-300
          outline-none
          transition"
        ></textarea>

        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mt-5">

          <div id="status" class="text-xs text-slate-500 text-center sm:text-left w-full sm:w-auto"></div>

          <button
            id="ask-btn"
            class="inline-flex items-center justify-center gap-2 bg-sky-600
            hover:bg-sky-500
            text-white
            text-sm
            font-bold
            px-5
            py-2
            rounded-2xl
            shadow-lg
            hover:shadow-sky-300/30
            transition-all
            duration-300
            active:scale-95
            mx-auto sm:mx-0"
          >
            <span id="ask-btn-text">Ask AI</span>
            <span
              id="ask-btn-spinner"
              class="hidden h-4 w-4 rounded-full border-2 border-white border-t-transparent animate-spin"
            ></span>
          </button>
        </div>
      </div>

      <!-- Answer Section -->
      <div
        id="answer-section"
        class="hidden bg-white border border-slate-200 rounded-2xl p-5 sm:p-6 shadow-lg hover:shadow-slate-300/40 transition-all"
      >

        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-3 sm:gap-0">

          <label class="text-sm sm:text-base font-semibold text-slate-800">
            AI Answer
          </label>

          <div id="meta" class="flex gap-2">

            <span
              id="type-pill"
              class="hidden px-3 py-1 rounded-full text-xs bg-sky-100 text-sky-700"
            ></span>

            <span
              id="tool-pill"
              class="hidden px-3 py-1 rounded-full text-xs bg-slate-100 text-slate-700"
            ></span>
          </div>
        </div>

        <!-- Answer Box -->
        <div
          id="answer"
          class="min-h-[120px] sm:min-h-[140px]
          rounded-2xl
          border border-slate-200
          bg-slate-50
          p-5
          text-slate-900
          shadow-inner"
        >
          <div id="answer-text" class="italic text-slate-600 text-sm sm:text-base">
            Your answer will appear here...
          </div>
        </div>

        <!-- Sources -->
        <details
          id="sources-wrap"
          class="hidden mt-5 rounded-2xl bg-slate-50 p-4 border border-slate-200"
        >
          <summary class="cursor-pointer font-semibold text-slate-800">
            View Sources
          </summary>

          <ol
            id="sources"
            class="list-decimal pl-6 mt-3 space-y-2 text-sm text-slate-600"
          ></ol>
        </details>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="absolute bottom-4 text-transparent bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 bg-clip-text text-sm font-semibold">
   
  </footer>

  <!-- App Script -->
  <script src="app.js"></script>

  
</body>
</html>
